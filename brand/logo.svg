<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>

  <!-- Helmet crest / plume -->
  <path d="M 40 20 C 44 10, 50 4, 55 3 C 60 4, 66 10, 70 20 C 65 15, 59 11, 55 10 C 51 11, 45 15, 40 20 Z"
        fill="url(#bronze)" opacity="0.8"/>

  <!-- Shield body (narrower) -->
  <path d="M 55 16 L 92 30 L 89 78 Q 55 116 21 78 L 18 30 Z" fill="url(#shield)"/>

  <!-- Double rim -->
  <path d="M 55 24 L 84 36 L 82 74 Q 55 106 28 74 L 26 36 Z"
        fill="none" stroke="url(#bronze)" stroke-width="1.5" opacity="0.35"/>
  <path d="M 55 31 L 78 41 L 76 70 Q 55 97 34 70 L 32 41 Z"
        fill="none" stroke="url(#bronze)" stroke-width="0.8" opacity="0.18"/>

  <!-- Shield highlight -->
  <path d="M 55 16 L 92 30 L 90 48 Q 55 56 20 48 L 18 30 Z"
        fill="white" opacity="0.07"/>

  <!-- Lambda -->
  <path d="M 55 36 L 74 92 L 64 92 L 55 56 L 46 92 L 36 92 Z" fill="url(#bronze)"/>

  <!-- Wordmark -->
  <text x="112" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>
  <text x="115" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
